services:
  dagster_webserver:
    build: ./webserver
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB}
      - DAGSTER_POSTGRES_HOSTNAME=${DAGSTER_POSTGRES_HOSTNAME}
      - DAGSTER_POSTGRES_PORT=${DAGSTER_POSTGRES_PORT}
    volumes:
      - ./workspace.yaml:/opt/dagster/app/workspace.yaml
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
    ports:
      - "3000:3000"
    depends_on:
      - ingestion_service
      - processing_service
      - summarizer_service
    command: dagster dev -w workspace.yaml -h 0.0.0.0 -p 3000

  ingestion_service:
    build: ./ingestion
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB}
      - DAGSTER_POSTGRES_HOSTNAME=${DAGSTER_POSTGRES_HOSTNAME}
      - DAGSTER_POSTGRES_PORT=${DAGSTER_POSTGRES_PORT}
    volumes:
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
    ports:
      - "4000"


  processing_service:
    build: ./processing
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB}
      - DAGSTER_POSTGRES_HOSTNAME=${DAGSTER_POSTGRES_HOSTNAME}
      - DAGSTER_POSTGRES_PORT=${DAGSTER_POSTGRES_PORT}
    volumes:
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
    ports:
      - "4000"


  summarizer_service:
    build: ./summarizer
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_AI_STUDIO_API_KEY=${GOOGLE_AI_STUDIO_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB}
      - DAGSTER_POSTGRES_HOSTNAME=${DAGSTER_POSTGRES_HOSTNAME}
      - DAGSTER_POSTGRES_PORT=${DAGSTER_POSTGRES_PORT}
    volumes:
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
    ports:
      - "4002"

  investigative_agent:
    build: ./summarizer
    command: python server.py
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_AI_STUDIO_API_KEY=${GOOGLE_AI_STUDIO_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - ingestion_service


  frontend_service:
    build: ./frontend
    environment:
      - VITE_SUPABASE_URL=https://ngdivxoeezwytiqubgry.supabase.co
      - VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nZGl2eG9lZXp3eXRpcXViZ3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3ODI4NDEsImV4cCI6MjA4NTM1ODg0MX0.1dDlEaUg8Wh3ewP-86mKtUOMAz-skU3zAKo-r7iQv-s
      - VITE_OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    ports:
      - "5173:5173"
    depends_on:
      - ingestion_service
