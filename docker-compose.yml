services:
  dagster_webserver:
    build: ./webserver
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB}
      - DAGSTER_POSTGRES_HOSTNAME=${DAGSTER_POSTGRES_HOSTNAME}
      - DAGSTER_POSTGRES_PORT=${DAGSTER_POSTGRES_PORT}
    volumes:
      - ./workspace.yaml:/opt/dagster/app/workspace.yaml
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
    ports:
      - "3000:3000"
    depends_on:
      - ingestion_service
      - processing_service
      - summarizer_service
    command: dagster dev -w workspace.yaml -h 0.0.0.0 -p 3000
    env_file:
      - .env

  ingestion_service:
    build: ./ingestion
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB}
      - DAGSTER_POSTGRES_HOSTNAME=${DAGSTER_POSTGRES_HOSTNAME}
      - DAGSTER_POSTGRES_PORT=${DAGSTER_POSTGRES_PORT}
    volumes:
      - ./ingestion:/opt/dagster/app
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
    ports:
      - "4000"
    env_file:
      - .env

  processing_service:
    build: ./processing
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB}
      - DAGSTER_POSTGRES_HOSTNAME=${DAGSTER_POSTGRES_HOSTNAME}
      - DAGSTER_POSTGRES_PORT=${DAGSTER_POSTGRES_PORT}
    volumes:
      - ./processing:/opt/dagster/app
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
    ports:
      - "4000"
    env_file:
      - .env

  summarizer_service:
    build: ./summarizer
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_AI_STUDIO_API_KEY=${GOOGLE_AI_STUDIO_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB}
      - DAGSTER_POSTGRES_HOSTNAME=${DAGSTER_POSTGRES_HOSTNAME}
      - DAGSTER_POSTGRES_PORT=${DAGSTER_POSTGRES_PORT}
    volumes:
      - ./summarizer:/opt/dagster/app
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
    ports:
      - "4002"
    env_file:
      - .env

  investigative_agent:
    build: ./summarizer
    command: python server.py
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_AI_STUDIO_API_KEY=${GOOGLE_AI_STUDIO_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    volumes:
      - ./summarizer:/app
    ports:
      - "8000:8000"
    working_dir: /app
    depends_on:
      - ingestion_service
    env_file:
      - .env

  frontend_service:
    build:
      context: ./frontend
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_OPENROUTER_API_KEY=${VITE_OPENROUTER_API_KEY}
        - VITE_GOOGLE_AI_STUDIO_API_KEY=${VITE_GOOGLE_AI_STUDIO_API_KEY}
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_OPENROUTER_API_KEY=${VITE_OPENROUTER_API_KEY}
      - VITE_GOOGLE_AI_STUDIO_API_KEY=${VITE_GOOGLE_AI_STUDIO_API_KEY}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:80"
    depends_on:
      - ingestion_service
    env_file:
      - .env
