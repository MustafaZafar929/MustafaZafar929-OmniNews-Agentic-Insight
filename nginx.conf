server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name omni-news.app 158.178.236.176;

    ssl_certificate /etc/letsencrypt/live/omni-news.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omni-news.app/privkey.pem;

    # Optimization for large headers and dynamic resolution
    resolver 127.0.0.11 valid=30s;
    proxy_buffer_size   128k;
    proxy_buffers   4 256k;
    proxy_busy_buffers_size   256k;

    # Investigative Agent API
    location /api/ {
        proxy_pass http://investigative_agent:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Supabase Proxy (to avoid Mixed Content)
    location /supabase {
        proxy_pass http://134.185.89.203:8000/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Dagster Webserver
    location /dagster/ {
        proxy_pass http://dagster_webserver:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Frontend (Catch-all)
    location / {
        proxy_pass http://frontend_service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Additional timeouts for reliability
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
